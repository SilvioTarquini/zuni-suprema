<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pixel Test — ZUNI Suprema</title>
  <!-- Meta Pixel Code -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '840645502240564');
  fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=840645502240564&ev=PageView&noscript=1"
  /></noscript>
  <!-- End Meta Pixel Code -->
  <style>
    body { background: #0a0a0a; color: #f0f0f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
    h2 { color: #c9a96e; }
    button { padding: 14px 32px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    #btn-purchase { background: #c9a96e; color: #0a0a0a; font-weight: bold; }
    #btn-pageview  { background: #333; color: #f0f0f0; }
    #log { background: #111; border: 1px solid #333; padding: 16px; border-radius: 8px; width: 400px; font-size: 13px; min-height: 80px; white-space: pre-wrap; }
    .ok  { color: #4caf50; }
    .inf { color: #888; }
  </style>
</head>
<body>
  <h2>Pixel Test — ZUNI Suprema</h2>
  <button id="btn-pageview"  onclick="testarPageView()">Disparar PageView</button>
  <button id="btn-purchase"  onclick="testarPurchase()">Disparar Purchase (R$ 29,90)</button>
  <div id="log"><span class="inf">Aguardando...</span></div>

  <script>
    const log = document.getElementById('log');

    function registrar(msg, ok = true) {
      const ts = new Date().toLocaleTimeString('pt-BR');
      log.innerHTML += `<span class="${ok ? 'ok' : 'inf'}">[${ts}] ${msg}\n</span>`;
    }

    window.onload = () => registrar('Pixel carregado — PageView automático disparado.', true);

    function testarPageView() {
      fbq('track', 'PageView');
      registrar('PageView disparado manualmente.');
    }

    function testarPurchase() {
      fbq('track', 'Purchase', { value: 29.90, currency: 'BRL' });
      registrar('Purchase disparado — value: 29.90, currency: BRL');
    }
  </script>
</body>
</html>
