<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor ZUNI Suprema</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Georgia', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-logo { font-size: 11px; letter-spacing: 3px; color: #c9a84c; text-transform: uppercase; }
    .counter { font-size: 12px; color: #555; }
    .counter span { color: #c9a84c; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
    }
    .msg.user {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      align-self: flex-end;
      color: #ddd;
    }
    .msg.assistant {
      background: #141414;
      border: 1px solid #c9a84c33;
      align-self: flex-start;
      color: #f0f0f0;
    }
    .msg .author {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: #c9a84c;
    }
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid #1e1e1e;
      display: flex;
      gap: 12px;
    }
    #input {
      flex: 1;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px 16px;
      color: #f0f0f0;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      resize: none;
      transition: border-color 0.2s;
    }
    #input:focus { border-color: #c9a84c; }
    #sendBtn {
      background: linear-gradient(135deg, #c9a84c, #e8c96a);
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #sendBtn:hover { opacity: 0.9; }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    .typing { color: #555; font-style: italic; font-size: 13px; padding: 4px 0; }
    audio { display: none; }
  </style>
</head>
<body>
  <header>
    <div class="header-logo">Mentor ZUNI Suprema</div>
    <div class="counter">Mensagens: <span id="cnt">0</span>/20</div>
  </header>
  <div id="messages"></div>
  <div class="input-area">
    <textarea id="input" rows="2" placeholder="Digite sua mensagem..."></textarea>
    <button id="sendBtn" onclick="enviar()">➤</button>
  </div>
  <audio id="audio"></audio>
  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('sessionId');
    let contador = 0;
    if (!sessionId) { window.location.href = '/checkout.html'; }
    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const author = role === 'assistant' ? 'Mentor ZUNI' : 'Você';
      div.innerHTML = `<div class="author">${author}</div>${text}`;
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView({ behavior: 'smooth' });
    }
    async function enviar() {
      const input = document.getElementById('input');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      document.getElementById('sendBtn').disabled = true;
      addMsg('user', msg);
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.textContent = 'Mentor ZUNI está respondendo...';
      document.getElementById('messages').appendChild(typing);
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message: msg })
        });
        const data = await res.json();
        typing.remove();
        if (data.texto) {
          addMsg('assistant', data.texto);
          contador = data.contador || contador + 1;
          document.getElementById('cnt').textContent = contador;
          if (data.audio) {
            const audio = document.getElementById('audio');
            audio.src = `data:audio/mpeg;base64,${data.audio}`;
            audio.play();
          }
          if (contador >= 20) { setTimeout(gerarRelatorio, 1500); }
        } else {
          addMsg('assistant', data.error || 'Erro ao processar resposta.');
        }
      } catch (e) {
        typing.remove();
        addMsg('assistant', 'Erro de conexão. Tente novamente.');
      }
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }
    async function gerarRelatorio() {
      addMsg('assistant', 'Sua jornada está completa. Gerando seu Mapa Integrativo...');
      try {
        await fetch('/api/relatorio', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });
        window.location.href = '/obrigado.html';
      } catch (e) {
        addMsg('assistant', 'Erro ao gerar relatório. Entre em contato com o suporte.');
      }
    }
    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
    });
  </script>
</body>
</html>
