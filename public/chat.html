<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor ZUNI Suprema</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap');

    :root {
      --perola: #F8F5F0;
      --champagne: #F7E7CE;
      --dourado: #D4AF37;
      --dourado-hover: #C5A032;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: url('./public/Desktop%202.png') no-repeat center center fixed;
      background-size: cover;
      color: #1a1a1a;
    }

    @media (max-width: 768px) {
      body {
        background: url('./public/Smartphone%202.png') no-repeat center center fixed;
        background-size: cover;
      }
    }

    .chat-overlay {
      background: linear-gradient(rgba(248,245,240,0.75), rgba(247,231,206,0.75));
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(248,245,240,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(212,175,55,0.3);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--dourado);
      text-transform: uppercase;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(212,175,55,0.3);
    }

    .counter {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: #9a9a9a;
    }
    .counter span { color: var(--dourado); font-weight: 500; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      padding-bottom: 110px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg-usuario,
    .msg-mentor {
      max-width: 85%;
      padding: 14px 16px;
      font-family: 'Georgia', serif;
      font-size: 18px;
      line-height: 1.65;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .msg-usuario {
      background: rgba(247,231,206,0.95);
      border: 1px solid var(--dourado);
      border-radius: 18px;
      align-self: flex-end;
      color: #2a2a2a;
    }

    .msg-mentor {
      background: rgba(248,245,240,0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 18px;
      align-self: flex-start;
      color: #1a1a1a;
    }

    .msg-autor {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--dourado);
      font-weight: 500;
    }

    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(248,245,240,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
      align-items: flex-end;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      border-top: 1px solid rgba(212,175,55,0.3);
      z-index: 10;
    }

    #input-mensagem {
      flex: 1;
      background: var(--perola);
      border: 2px solid rgba(212,175,55,0.4);
      border-radius: 30px;
      padding: 14px 18px;
      min-height: 48px;
      max-height: 120px;
      color: #1a1a1a;
      font-size: 17px;
      font-family: inherit;
      outline: none;
      resize: none;
      transition: border-color 0.2s;
    }
    #input-mensagem::placeholder { color: #999; opacity: 1; }
    #input-mensagem:focus { border-color: var(--dourado); }

    #btn-enviar,
    #btn-microfone {
      background: var(--dourado);
      color: var(--perola);
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      min-width: 48px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    #btn-enviar:hover,
    #btn-microfone:hover {
      background: var(--dourado-hover);
      box-shadow: 0 4px 15px rgba(212,175,55,0.4);
    }
    #btn-enviar:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

    #btn-microfone.recording {
      background: linear-gradient(135deg, #e05555, #ff7777);
      animation: micPulse 0.8s infinite alternate;
    }
    @keyframes micPulse {
      from { opacity: 0.85; transform: scale(1); }
      to   { opacity: 1;    transform: scale(1.07); }
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 10px 16px;
      align-self: flex-start;
    }
    .typing .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dourado);
      animation: pulse 1.4s infinite ease-in-out;
    }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1); }
    }

    audio { display: none; }

    .play-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 17px;
      margin-top: 8px;
      padding: 4px 10px;
      border-radius: 20px;
      color: var(--dourado);
      display: inline-block;
      transition: background 0.15s;
    }
    .play-btn:hover { background: rgba(212,175,55,0.13); }
    .play-btn.playing { color: #e07a10; }

    #btn-whatsapp {
      position: fixed;
      bottom: 90px;
      right: 16px;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--dourado), var(--champagne));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(212,175,55,0.5);
      z-index: 1000;
      transition: transform 0.2s;
    }
    #btn-whatsapp:hover { transform: scale(1.08); }
    #btn-whatsapp svg { width: 28px; height: 28px; }

    @media (min-width: 769px) {
      #messages { padding: 24px; padding-bottom: 110px; }
      .input-area { padding: 16px 24px; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
      .msg-usuario, .msg-mentor { max-width: 70%; font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="chat-overlay">

    <header>
      <h1>Mentor ZUNI Suprema</h1>
      <div class="counter">Mensagens: <span id="cnt">0</span>/20</div>
    </header>

    <div id="messages"></div>

    <div class="input-area">
      <textarea id="input-mensagem" rows="1" placeholder="Digite sua mensagem..."></textarea>
      <button id="btn-microfone" style="display:none" title="Falar">🎤</button>
      <button id="btn-enviar" onclick="enviar()">➤</button>
    </div>

  </div><!-- /.chat-overlay -->

  <audio id="audio"></audio>

  <a id="btn-whatsapp" href="https://wa.me/5515996088895?text=Ol%C3%A1!%20Vim%20do%20Mapa%20Integrativo%20ZUNI%20Suprema%20e%20gostaria%20de%20falar%20com%20um%20profissional." target="_blank" rel="noopener noreferrer" title="Falar no WhatsApp">
    <svg viewBox="0 0 32 32" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 0C7.163 0 0 7.163 0 16c0 2.837.738 5.5 2.03 7.81L0 32l8.4-2.205A15.93 15.93 0 0 0 16 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm0 29.09c-2.553 0-4.95-.71-6.99-1.94l-.5-.297-4.99 1.31 1.33-4.86-.325-.5A13.07 13.07 0 0 1 2.91 16C2.91 8.78 8.78 2.91 16 2.91S29.09 8.78 29.09 16 23.22 29.09 16 29.09zm7.17-9.78c-.39-.196-2.31-1.14-2.67-1.27-.36-.13-.62-.196-.88.196-.26.39-1.01 1.27-1.24 1.53-.23.26-.46.29-.85.1-.39-.196-1.65-.608-3.14-1.94-1.16-1.035-1.95-2.31-2.18-2.7-.23-.39-.025-.6.17-.81.196-.196.46-.51.69-.77.23-.26.3-.45.46-.75.16-.3.05-.55-.1-.75-.15-.196-1.36-3.27-1.86-4.48-.49-1.21-1-1.04-1.37-1.06-.36-.02-.78-.024-1.2-.024-.42 0-1.1.157-1.62.747-.52.59-1.99 1.94-1.99 4.73 0 2.79 2.04 5.49 2.32 5.87.28.39 3.91 5.98 9.5 8.15 5.59 2.17 5.59 1.45 6.6 1.36 1.01-.1 3.27-1.34 3.73-2.63.46-1.29.46-2.4.32-2.63-.14-.23-.39-.36-.78-.55z"/>
    </svg>
  </a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('sessionId');
    let contador = 0;
    if (!sessionId) { window.location.href = '/checkout.html'; }

    let currentAudio = null;
    let currentPlayBtn = null;

    function stopCurrentAudio() {
      if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
      if (currentPlayBtn) { currentPlayBtn.textContent = '🔊'; currentPlayBtn.classList.remove('playing'); }
      currentAudio = null;
      currentPlayBtn = null;
    }

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = role === 'assistant' ? 'msg-mentor' : 'msg-usuario';
      const author = role === 'assistant' ? 'Mentor ZUNI' : 'Você';
      div.innerHTML = `<div class="msg-autor">${author}</div>${text}`;
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return div;
    }

    function attachAudio(msgDiv, base64) {
      const audioEl = new Audio(`data:audio/mpeg;base64,${base64}`);
      const playBtn = document.createElement('button');
      playBtn.className = 'play-btn';
      playBtn.title = 'Ouvir mensagem';
      playBtn.textContent = '🔊';

      playBtn.addEventListener('click', () => {
        if (currentAudio === audioEl) {
          stopCurrentAudio();
        } else {
          stopCurrentAudio();
          audioEl.currentTime = 0;
          audioEl.play().catch(() => {});
          currentAudio = audioEl;
          currentPlayBtn = playBtn;
          playBtn.textContent = '⏸';
          playBtn.classList.add('playing');
        }
      });

      audioEl.addEventListener('ended', () => {
        if (currentPlayBtn === playBtn) {
          playBtn.textContent = '🔊';
          playBtn.classList.remove('playing');
          currentAudio = null;
          currentPlayBtn = null;
        }
      });

      msgDiv.appendChild(playBtn);

      stopCurrentAudio();
      audioEl.play().then(() => {
        currentAudio = audioEl;
        currentPlayBtn = playBtn;
        playBtn.textContent = '⏸';
        playBtn.classList.add('playing');
      }).catch(() => {});
    }

    async function enviar() {
      const input = document.getElementById('input-mensagem');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      document.getElementById('btn-enviar').disabled = true;
      addMsg('user', msg);
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      document.getElementById('messages').appendChild(typing);
      typing.scrollIntoView({ behavior: 'smooth', block: 'end' });
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message: msg })
        });
        const data = await res.json();
        typing.remove();
        if (data.texto) {
          const msgDiv = addMsg('assistant', data.texto);
          contador = data.contador || contador + 1;
          document.getElementById('cnt').textContent = contador;
          if (data.audio) {
            attachAudio(msgDiv, data.audio);
          }
          if (contador >= 20) {
            addMsg('assistant', 'Nossa sessão chegou ao fim. Em instantes você receberá seu Mapa Integrativo ZUNI Suprema por email. Por favor, verifique sua caixa de entrada (e a pasta de spam).');
            setTimeout(gerarRelatorio, 1500);
          }
        } else {
          addMsg('assistant', data.error || 'Erro ao processar resposta.');
        }
      } catch (e) {
        typing.remove();
        addMsg('assistant', 'Erro de conexão. Tente novamente.');
      }
      document.getElementById('btn-enviar').disabled = false;
      input.focus();
    }

    async function gerarRelatorio() {
      addMsg('assistant', 'Sua jornada está completa. Gerando seu Mapa Integrativo...');
      try {
        await fetch('/api/relatorio', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });
        window.location.href = '/obrigado.html';
      } catch (e) {
        addMsg('assistant', 'Erro ao gerar relatório. Entre em contato com o suporte.');
      }
    }

    document.getElementById('input-mensagem').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
    });

    // Web Speech API — botão de mic só aparece quando suportado
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const micBtn = document.getElementById('btn-microfone');
      micBtn.style.display = '';

      const recognition = new SpeechRecognition();
      recognition.lang = 'pt-BR';
      recognition.continuous = false;
      recognition.interimResults = false;

      let isRecording = false;

      micBtn.addEventListener('click', () => {
        if (isRecording) {
          recognition.stop();
        } else {
          try {
            recognition.start();
            isRecording = true;
            micBtn.classList.add('recording');
            micBtn.title = 'Parar gravação';
          } catch (e) {}
        }
      });

      recognition.addEventListener('result', e => {
        const transcript = e.results[0][0].transcript;
        const inputEl = document.getElementById('input-mensagem');
        inputEl.value = transcript;
        inputEl.focus();
      });

      const stopRecording = () => {
        isRecording = false;
        micBtn.classList.remove('recording');
        micBtn.title = 'Falar';
      };
      recognition.addEventListener('end', stopRecording);
      recognition.addEventListener('error', stopRecording);
    }
  </script>
</body>
</html>
